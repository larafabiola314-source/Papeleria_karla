<div class="flex flex-col gap-8 p-4 md:p-6">

  <section class="rounded-3xl bg-white p-6 shadow-sm border border-slate-100 md:p-8">
    <div class="mb-6 border-b border-slate-50 pb-4">
      <h3 class="text-lg font-black tracking-tight text-lila-karla uppercase flex items-center gap-2">
        <span class="material-symbols-outlined !text-2xl">person_add</span> Datos del Usuario
      </h3>
    </div>
    
    <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
      <div class="flex flex-col gap-2">
        <label class="ml-1 text-[10px] font-black tracking-widest text-slate-500 uppercase">Nombre</label>
        <input type="text" [value]="nombre()" (input)="nombre.set($any($event.target).value)" 
               placeholder="Nombre del empleado"
               class="w-full rounded-2xl border-2 border-slate-50 bg-slate-50 p-3 text-sm font-semibold outline-none transition-all focus:border-lila-karla focus:bg-white">
      </div>

      <div class="flex flex-col gap-2">
        <label class="ml-1 text-[10px] font-black tracking-widest text-slate-500 uppercase">Apellido Paterno</label>
        <input type="text" [value]="ap()" (input)="ap.set($any($event.target).value)" 
               placeholder="Apellido paterno"
               class="w-full rounded-2xl border-2 border-slate-50 bg-slate-50 p-3 text-sm font-semibold outline-none transition-all focus:border-lila-karla focus:bg-white">
      </div>

      <div class="flex flex-col gap-2">
        <label class="ml-1 text-[10px] font-black tracking-widest text-slate-500 uppercase">Apellido Materno</label>
        <input type="text" [value]="am()" (input)="am.set($any($event.target).value)" 
               placeholder="Apellido materno"
               class="w-full rounded-2xl border-2 border-slate-50 bg-slate-50 p-3 text-sm font-semibold outline-none transition-all focus:border-lila-karla focus:bg-white">
      </div>

      <div class="flex flex-col gap-2">
        <label class="ml-1 text-[10px] font-black tracking-widest text-slate-500 uppercase">Nombre de Usuario</label>
        <input type="text" [value]="username()" (input)="username.set($any($event.target).value)" 
               placeholder="ej: karla.admin"
               class="w-full rounded-2xl border-2 border-slate-50 bg-slate-50 p-3 text-sm font-semibold outline-none transition-all focus:border-lila-karla focus:bg-white">
      </div>

      <div class="flex flex-col gap-2">
        <label class="ml-1 text-[10px] font-black tracking-widest text-slate-500 uppercase">Contraseña</label>
        <input type="password" [value]="password()" (input)="password.set($any($event.target).value)" 
               placeholder="••••••••"
               class="w-full rounded-2xl border-2 border-slate-50 bg-slate-50 p-3 text-sm font-semibold outline-none transition-all focus:border-lila-karla focus:bg-white">
      </div>

      <div class="flex items-end gap-3 lg:col-span-1">
        <button (click)="limpiarCampos()" [disabled]="cargando()"
                class="flex-1 rounded-2xl bg-slate-100 py-3 text-xs font-black text-slate-500 transition-all hover:bg-slate-200 active:scale-95 disabled:opacity-50">
          {{ idEditando() ? 'CANCELAR' : 'LIMPIAR' }}
        </button>
        
        <button (click)="registrarUsuario()" [disabled]="cargando()"
                class="flex-1 rounded-2xl bg-lila-karla py-3 text-xs font-black text-white shadow-lg shadow-purple-100 transition-all hover:bg-vino-karla active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
          {{ cargando() ? 'ESPERA...' : (idEditando() ? 'ACTUALIZAR' : 'GUARDAR') }}
        </button>
      </div>
    </div>
  </section>

  <section class="rounded-3xl bg-white shadow-sm border border-slate-100 overflow-hidden">
    <div class="bg-slate-50/50 px-8 py-4 border-b border-slate-100">
      <h3 class="text-sm font-black tracking-widest text-slate-400 uppercase">Cuentas Registradas</h3>
    </div>

    <div class="overflow-x-auto">
      <table class="w-full border-collapse text-left">
        <thead class="bg-slate-50 text-[10px] font-black tracking-widest text-slate-400 uppercase">
          <tr>
            <th class="p-4 pl-8">ID</th>
            <th class="p-4">Nombre Completo</th>
            <th class="p-4">Username</th>
            <th class="p-4">Registro</th>
            <th class="p-4 pr-8 text-right">Acciones</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-50">
          <tr *ngFor="let u of listaUsuarios()" class="group transition-colors hover:bg-slate-50/50">
            <td class="p-4 pl-8 text-xs font-bold text-slate-400">#{{ u.Id_Usuario }}</td>
            <td class="p-4 text-sm font-black text-slate-800">{{ u.Nombre }} {{ u.AP }} {{ u.AM }}</td>
            <td class="p-4">
              <span class="rounded-lg bg-purple-50 px-2 py-1 text-xs font-bold text-lila-karla">
                @{{ u.Username }}
              </span>
            </td>
            <td class="p-4 text-xs font-medium text-slate-400">{{ u.Created_at | date:'dd/MM/yyyy' }}</td>
            <td class="p-4 pr-8 text-right">
              <div class="flex justify-end items-center gap-2">
                <button (click)="prepararEdicion(u)" 
                        class="group relative flex h-9 w-9 items-center justify-center rounded-full transition-all hover:bg-purple-50 active:scale-90"
                        title="Editar datos de usuario">
                  <span class="material-symbols-outlined !text-xl text-lila-karla group-hover:text-vino-karla">
                    person_edit
                  </span>
                </button>
                
                <button (click)="eliminarUsuario(u.Id_Usuario)"
                        [disabled]="u.Id_Usuario === idUsuarioLogueado()"
                        [title]="u.Id_Usuario === idUsuarioLogueado() ? 'No puedes eliminar tu propia cuenta' : 'Eliminar usuario'"
                        class="group relative flex h-9 w-9 items-center justify-center rounded-full transition-all hover:bg-red-50 active:scale-90 disabled:opacity-20 disabled:cursor-not-allowed disabled:hover:bg-transparent">
                  <span class="material-symbols-outlined !text-xl text-red-400 group-hover:text-red-600">
                    person_remove
                  </span>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</div>
