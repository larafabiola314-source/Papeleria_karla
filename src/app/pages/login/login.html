<div class="min-h-screen flex items-center justify-center bg-lila-karla p-4 font-sans">
  
  <div class="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center transform transition-all border border-white/20">
    
    <div class="mb-6 flex justify-center">
      <img src="img/logo.png" alt="Logo Papelería Karla" class="h-24 max-w-80 drop-shadow-lg">
    </div>

    <h2 class="text-3xl font-black text-slate-800 tracking-tight">Papelería Karla</h2>
    
    <div class="h-1.5 w-12 bg-lila-karla mx-auto my-5 rounded-full shadow-sm shadow-purple-100"></div>
    
    <p class="text-slate-400 font-bold text-xs uppercase tracking-[0.2em] mb-10">Panel de Administración</p>

    <form (submit)="iniciarSesion($event)" class="space-y-6 text-left">
      <div class="space-y-2 group">
        <label for="usuario" class="text-[10px] font-black text-slate-400 ml-1 uppercase tracking-widest transition-colors group-focus-within:text-lila-karla">Usuario</label>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-lila-karla transition-colors material-symbols-outlined !text-xl">
            person
          </span>
          <input 
            type="text" 
            id="usuario" 
            name="usuario"
            placeholder="Escribe tu usuario"
            (input)="actualizarUsuario($event)"
            class="w-full p-4 pl-12 bg-slate-50 border-2 border-slate-50 rounded-2xl focus:border-lila-karla focus:bg-white outline-none transition-all font-bold text-slate-700 placeholder:text-slate-300 placeholder:font-medium">
        </div>
      </div>

      <div class="space-y-2 group">
        <label for="contrasenia" class="text-[10px] font-black text-slate-400 ml-1 uppercase tracking-widest transition-colors group-focus-within:text-lila-karla">Contraseña</label>
        <div class="relative">
         <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-lila-karla transition-colors material-symbols-outlined !text-xl">
          key
        </span>
          <input 
            type="password" 
            id="contrasenia" 
            name="contrasenia"
            placeholder="••••••••"
            (input)="actualizarPassword($event)"
            class="w-full p-4 pl-12 bg-slate-50 border-2 border-slate-50 rounded-2xl focus:border-lila-karla focus:bg-white outline-none transition-all font-bold text-slate-700 placeholder:text-slate-300 placeholder:font-medium">
        </div>
      </div>

      <button type="submit" 
              class="w-full py-5 mt-6 bg-lila-karla hover:bg-vino-karla text-white font-black rounded-2xl transition-all shadow-xl shadow-purple-100 active:scale-95 disabled:bg-slate-200 disabled:shadow-none disabled:cursor-not-allowed group"
              [disabled]="cargando()">
        
        <div *ngIf="!cargando()" class="flex items-center justify-center gap-2 tracking-widest uppercase text-sm">
          ENTRAR AL SISTEMA
          <span class="material-symbols-outlined !text-lg transition-transform group-hover:translate-x-1">login</span>
        </div>
        
        <div *ngIf="cargando()" class="flex items-center justify-center gap-3 text-sm font-black tracking-widest uppercase">
          <div class="h-5 w-5 border-3 border-white/30 border-t-white rounded-full animate-spin"></div>
          AUTENTICANDO...
        </div>
      </button>

      <div class="mt-8 text-center border-t border-slate-50 pt-0">
      <a routerLink="/solicitar-reset" 
         class="group inline-flex items-center gap-2 text-[11px] font-black uppercase tracking-widest text-slate-400 hover:text-lila-karla transition-all">
        <span class="material-symbols-outlined !text-lg transition-transform group-hover:-rotate-12">
          help_center
        </span>
        ¿Olvidaste tu contraseña?
      </a>
    </div>

    </form>
    

  </div>
</div>
